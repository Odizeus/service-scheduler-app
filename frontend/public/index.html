        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
        <script>
            (function () {
                function syncRouteClass() {
                    document.body && document.body.classList.toggle("is-admin-route", window.location.pathname.indexOf("/admin") === 0);
                }
                window.addEventListener("DOMContentLoaded", syncRouteClass);
                window.addEventListener("popstate", syncRouteClass);
                var pushState = history.pushState;
                history.pushState = function () {
                    pushState.apply(history, arguments);
                    setTimeout(syncRouteClass, 0);
                };
                var replaceState = history.replaceState;
                history.replaceState = function () {
                    replaceState.apply(history, arguments);
                    setTimeout(syncRouteClass, 0);
                };
            })();
        </script>
